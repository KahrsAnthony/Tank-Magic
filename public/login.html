<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tank Magic Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(20, 24, 38, 0.55), rgba(20, 24, 38, 0.8)),
        url('https://images.unsplash.com/photo-1518495973542-4542c06a5843?auto=format&fit=crop&w=1400&q=80');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 28px 22px;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.9;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
    }

    button {
      color: white;
      font-weight: bold;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      cursor: pointer;
    }

    .hint {
      margin-top: 14px;
      opacity: 0.85;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Tank Magic</h1>
    <p>Sign in to continue</p>

    <form method="POST" action="/login">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>

    <div class="hint">
      admin / user / viewer
    </div>
  </div>
</body>
</html>
