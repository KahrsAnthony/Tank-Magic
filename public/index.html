<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tank Magic</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(20, 24, 38, 0.55), rgba(20, 24, 38, 0.8)),
        url('https://images.unsplash.com/photo-1518495973542-4542c06a5843?auto=format&fit=crop&w=1400&q=80');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .panel {
      width: 90%;
      max-width: 430px;
      text-align: center;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 28px 22px;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
    }

    .subtitle {
      margin: 0 0 22px 0;
      font-size: 15px;
      opacity: 0.9;
    }

    button {
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      font-size: 18px;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: scale(1.03);
      opacity: 0.95;
    }

    .rain {
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      box-shadow: 0 0 18px rgba(96, 165, 250, 0.45);
    }

    .feed {
      background: linear-gradient(135deg, #34d399, #10b981);
      box-shadow: 0 0 18px rgba(52, 211, 153, 0.45);
    }

    .noise {
      background: linear-gradient(135deg, #f9a8d4, #ec4899);
      box-shadow: 0 0 18px rgba(236, 72, 153, 0.45);
    }

    .stop {
      background: linear-gradient(135deg, #f87171, #ef4444);
      box-shadow: 0 0 18px rgba(239, 68, 68, 0.45);
      margin-top: 16px;
    }
.feedShrimp {
  background: linear-gradient(135deg, #fb923c, #f97316);
  box-shadow: 0 0 18px rgba(249,115,22,0.5);
}

    #status {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.95;
      background: rgba(255, 255, 255, 0.08);
      padding: 12px;
      border-radius: 12px;
    }
.last-pressed {
  margin-top: 6px;
  font-size: 13px;
  font-weight: normal;
  opacity: 0.85;
}
button div:first-child {
  font-size: 18px;
  font-weight: bold;
}
  </style>
</head>
<body>
  <div class="panel">
    <h1>🌿 Tank Magic</h1>
    <p class="subtitle">🦐 Cute little ecosystem controller 🦐</p>

<button class="rain" data-control="true" onclick="sendCommand('rain')">
  <div>🌧️ Make it rain! <span id="rainStatus">🔴</span></div>
  <div class="last-pressed" id="rainLast">Rain timer: inactive</div>
</button>

<button class="feed" data-control="true" onclick="sendCommand('dose')">
  <div>🌱 Feed the plants! <span id="doseStatus">🔴</span></div>
  <div class="last-pressed" id="doseLast">Last pressed: never</div>
</button>

<button class="noise" data-control="true" onclick="sendCommand('noise')">
  <div>🔊 Make some noise! <span id="noiseStatus">🔴</span></div>
</button>

<button class="feedShrimp" data-control="true" onclick="sendCommand('shrimp')">
  <div>🍤 Feed the shrimp! <span id="shrimpStatus">🔴</span></div>
  <div class="last-pressed" id="shrimpLast">Last pressed: never</div>
</button>

<button class="stop" data-control="true" onclick="sendCommand('stop')">
  <div>🛑 Stop everything</div>
</button>

    <div id="status">Waiting for command...</div>
  </div>
<script>
  const lastPressedMap = {
    dose: 'doseLast',
    shrimp: 'shrimpLast',
    rain: 'rainLast',
  };

  async function loadUser() {
    const res = await fetch('/me');
    const data = await res.json();

    if (!data.loggedIn) {
      window.location = '/login.html';
      return;
    }

    const userInfo = document.getElementById('userInfo');
    if (userInfo) {
      userInfo.textContent = `${data.username} (${data.role})`;
    }

    if (data.role === 'viewer') {
      document.querySelectorAll('button[data-control="true"]').forEach(btn => {
        btn.disabled = true;
      });
    }
  }

function formatRemaining(ms) {
  const totalSeconds = Math.max(0, Math.floor(ms / 1000));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${minutes}:${seconds.toString().padStart(2, '0')}`;
}

async function loadButtonState() {
  try {
    const response = await fetch('/button-state');
    const state = await response.json();

    Object.keys(lastPressedMap).forEach((action) => {
      const el = document.getElementById(lastPressedMap[action]);
      const info = state[action];

      if (!el) return;

      if (!info) {
        if (action === 'rain') {
          el.textContent = 'Rain timer: inactive';
        } else {
          el.textContent = 'Last pressed: never';
        }
        return;
      }

      if (action === 'rain' && info.activeUntil) {
        const remainingMs = new Date(info.activeUntil) - new Date();

        if (remainingMs > 0) {
          el.textContent = `Rain timer: ${formatRemaining(remainingMs)} remaining`;
        } else {
          el.textContent = 'Rain timer: inactive';
        }
      } else {
        const when = new Date(info.time).toLocaleString();
        el.textContent = `Last pressed: ${when} by ${info.user}`;
      }
    });

    const rainStatus = document.getElementById('rainStatus');
    if (rainStatus) {
      if (state.rain && state.rain.activeUntil) {
        const remainingMs = new Date(state.rain.activeUntil) - new Date();
        rainStatus.textContent = remainingMs > 0 ? '🟢' : '🔴';
      } else {
        rainStatus.textContent = '🔴';
      }
    }
  } catch (error) {
    console.error('Failed to load button state', error);
  }
}

const activeTimers = {
  rain: null
};

const activeUntil = {
  rain: null
};

  async function sendCommand(action) {
    const status = document.getElementById('status');

    const statusMap = {
      rain: 'rainStatus',
      dose: 'doseStatus',
      noise: 'noiseStatus',
      shrimp: 'shrimpStatus'
    };

    try {
      if (action == 'dose' || action === 'shrimp') {
        const stateResponse = await fetch('/button-state');
        const state = await stateResponse.json();
        const lastInfo = state[action];

        if (lastInfo) {
          const lastDate = new Date(lastInfo.time);
          const now = new Date();

          const sameDay =
            lastDate.getFullYear() === now.getFullYear() &&
            lastDate.getMonth() === now.getMonth() &&
            lastDate.getDate() === now.getDate();

          if (sameDay) {
            const confirmed = confirm(
              `${action} was already pressed today by ${lastInfo.user} at ${lastDate.toLocaleTimeString()}. Press it again?`
            );

            if (!confirmed) {
              return;
            }
          }
        }
      }

      if (action === 'stop') {
        await fetch('/stop');
        document.getElementById('rainStatus').textContent = '🔴';
        document.getElementById('doseStatus').textContent = '🔴';
        document.getElementById('noiseStatus').textContent = '🔴';
        document.getElementById('shrimpStatus').textContent = '🔴';
        status.textContent = 'All systems stopped 🛑';
        await loadButtonState();
        return;
      }

      const indicatorId = statusMap[action];
      const indicator = document.getElementById(indicatorId);

      if (!indicator) {
        status.textContent = 'Unknown control';
        return;
      }

if (action === 'rain') {
  const response = await fetch('/rain');
  const text = await response.text();
  status.textContent = text;
  await loadButtonState();
  return;
}

const isCurrentlyOn = indicator.textContent === '🟢';

if (isCurrentlyOn) {
  indicator.textContent = '🔴';
  status.textContent = `${action} turned off`;
} else {
  const response = await fetch('/' + action);
  const text = await response.text();
  indicator.textContent = '🟢';
  status.textContent = text;
  await loadButtonState();
}

    } catch (error) {
      console.error(error);
      status.textContent = 'Error talking to server';
    }
  }
setInterval(loadButtonState, 1000);
  loadUser();
  loadButtonState();
</script>
</body>
</html>
