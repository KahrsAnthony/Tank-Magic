<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tank Magic</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background:
      radial-gradient(circle at center, rgba(60, 100, 180, 0.15), transparent 60%),
      linear-gradient(180deg, #0a1628, #02060f);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

body.storm-active::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: transparent;
  animation: lightningFlash 4s infinite;
  z-index: 0;
}

@keyframes lightningFlash {
  0%, 92%, 100% {
    background: rgba(255, 255, 255, 0);
  }
  93% {
    background: rgba(255, 255, 255, 0.08);
  }
  94% {
    background: rgba(255, 255, 255, 0.02);
  }
  95% {
    background: rgba(255, 255, 255, 0.12);
  }
  96% {
    background: rgba(255, 255, 255, 0.03);
  }
}

    .panel {
     position: relative;
     z-index: 1; 
     width: 90%;
      max-width: 430px;
      text-align: center;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 28px 22px;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

.emoji-burst {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 22px;
  will-change: transform, opacity;
  animation: emojiBurst 700ms ease-out forwards;
}

@keyframes emojiBurst {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(0.7) rotate(0deg);
  }
  100% {
    opacity: 0;
    transform: translate(var(--dx), var(--dy)) scale(1.35) rotate(var(--rot));
  }
}

.panel {
  position: relative;
  overflow: hidden;
}

.panel > * {
  position: relative;
  z-index: 2;
}

.shrimp-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}

.shrimp {
  position: absolute;
  font-size: 20px;
  opacity: 0.45;
  filter: blur(0.2px);
  will-change: transform, left;
}

.s1 {
  top: 12%;
  animation: shrimpSwim1 18s linear infinite;
}

.s2 {
  top: 32%;
  animation: shrimpSwim2 23s linear infinite;
}

.s3 {
  top: 56%;
  animation: shrimpSwim3 20s linear infinite;
}

.s4 {
  top: 78%;
  animation: shrimpSwim4 26s linear infinite;
}

.s5 {
  top: 22%;
  animation: shrimpSwim3 29s linear infinite;
  animation-delay: -8s;
}

.s6 {
  top: 68%;
  animation: shrimpSwim2 17s linear infinite;
  animation-delay: -13s;
}

@keyframes shrimpSwim1 {
  0%   { left: -40px; transform: translateY(0px) scaleX(1); }
  25%  { transform: translateY(-4px) scaleX(1); }
  50%  { transform: translateY(2px) scaleX(1); }
  100% { left: 110%; transform: translateY(-2px) scaleX(1); }
}

@keyframes shrimpSwim2 {
  0%   { left: 110%; transform: translateY(0px) scaleX(-1); }
  25%  { transform: translateY(3px) scaleX(-1); }
  50%  { transform: translateY(-3px) scaleX(-1); }
  100% { left: -40px; transform: translateY(1px) scaleX(-1); }
}

@keyframes shrimpSwim3 {
  0%   { left: -50px; transform: translateY(0px) scaleX(1); }
  30%  { transform: translateY(2px) scaleX(1); }
  60%  { transform: translateY(-4px) scaleX(1); }
  100% { left: 110%; transform: translateY(0px) scaleX(1); }
}

@keyframes shrimpSwim4 {
  0%   { left: 105%; transform: translateY(0px) scaleX(-1); }
  35%  { transform: translateY(-3px) scaleX(-1); }
  70%  { transform: translateY(3px) scaleX(-1); }
  100% { left: -45px; transform: translateY(0px) scaleX(-1); }
}

    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
    }

    .subtitle {
      margin: 0 0 22px 0;
      font-size: 15px;
      opacity: 0.9;
    }

button {
  width: 100%;
  padding: 18px;
  margin: 10px 0;
  font-size: 18px;
  font-weight: 600;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
  box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}

button:hover {
  transform: translateY(-2px);
  filter: brightness(1.05);
}

button:active {
  transform: scale(0.98);
}

.rain {
  background: linear-gradient(90deg, #4a505f, #0b0d12);
}

body.storm-active .rain {
  box-shadow: 0 0 18px rgba(120, 140, 200, 0.25);
}

.feed {
  background: linear-gradient(90deg, #2e8b57, #0d1f14);
}

.stop {
  background: linear-gradient(90deg, #b33939, #2a0a0a);
}

.feedShrimp {
  background: linear-gradient(90deg, #ff8c42, #2a1205);
}

    #status {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.95;
      background: rgba(255, 255, 255, 0.08);
      padding: 12px;
      border-radius: 12px;
    }
.last-pressed {
  margin-top: 6px;
  font-size: 13px;
  font-weight: normal;
  opacity: 0.85;
}
button div:first-child {
  font-size: 18px;
  font-weight: bold;
}
  </style>
</head>
<body>
  <div class="panel">
    <h1>🌿 Tank Magic</h1>
    <p class="subtitle">🦐 Cute little ecosystem controller 🦐</p>

<button class="rain" data-control="true" onclick="sendCommand('storm', event)">
  <div>⛈️ Storm Mode <span id="stormStatus">🔴</span></div>
  <div class="last-pressed" id="stormLast">Storm inactive</div>
</button>

<button class="feed" data-control="true" onclick="sendCommand('dose', event)">
  <div>🌱 Feed the plants! <span id="doseStatus">🔴</span></div>
  <div class="last-pressed" id="doseLast">Last pressed: never</div>
</button>

<button class="feedShrimp" data-control="true" onclick="sendCommand('shrimp', event)">
  <div>🍤 Feed the shrimp! <span id="shrimpStatus">🔴</span></div>
  <div class="last-pressed" id="shrimpLast">Last pressed: never</div>
</button>

<button class="stop" data-control="true" onclick="sendCommand('stop', event)">
  <div>🛑 Stop everything <span id="stopStatus">🔴</span></div>
  <div class="last-pressed" id="stopLast">E-stop: inactive</div>
</button>

<button class="stop" id="resetStopButton" style="display:none;" onclick="sendCommand('reset-stop')">
  <div>✅ Reset E-stop</div>
</button>

<div class="shrimp-layer" aria-hidden="true">
  <span class="shrimp s1">🦐</span>
  <span class="shrimp s2">🦐</span>
  <span class="shrimp s3">🦐</span>
  <span class="shrimp s4">🦐</span>
  <span class="shrimp s5">🦐</span>
  <span class="shrimp s6">🦐</span>
</div>

    <div id="status">Waiting for command...</div>
  </div>
<script>

const lastPressedMap = {
  dose: 'doseLast',
  shrimp: 'shrimpLast',
  storm: 'stormLast',
  stop: 'stopLast'
};

let currentUserRole = null;

  async function loadUser() {
    const res = await fetch('/me');
    const data = await res.json();

    if (!data.loggedIn) {
      window.location = '/login.html';
      return;
    }

    const userInfo = document.getElementById('userInfo');
    if (userInfo) {
      userInfo.textContent = `${data.username} (${data.role})`;
    }
currentUserRole = data.role;

    if (data.role === 'viewer') {
      document.querySelectorAll('button[data-control="true"]').forEach(btn => {
        btn.disabled = true;
      });
    }
  }

function formatRemaining(ms) {
  const totalSeconds = Math.max(0, Math.floor(ms / 1000));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${minutes}:${seconds.toString().padStart(2, '0')}`;
}

async function loadButtonState() {
  try {
    const response = await fetch('/button-state');
    const state = await response.json();

    Object.keys(lastPressedMap).forEach((action) => {
      const el = document.getElementById(lastPressedMap[action]);
      const info = state[action];

      if (!el) return;

if (!info) {
  if (action === 'rain') {
    el.textContent = 'Rain timer: inactive';
  } else if (action === 'noise') {
    el.textContent = 'Noise timer: inactive';
  } else if (action === 'stop') {
    el.textContent = 'E-stop: inactive';
  } else {
    el.textContent = 'Last pressed: never';
  }
  return;
}

if (action === 'stop' && info.active === true) {
  const when = new Date(info.time).toLocaleString();
  el.textContent = `E-stop active since ${when} by ${info.user}`;
} else if ((action === 'rain' || action === 'noise') && info.activeUntil) {
  const remainingMs = new Date(info.activeUntil) - new Date();

  if (remainingMs > 0) {
    if (action === 'rain') {
      el.textContent = `Rain timer: ${formatRemaining(remainingMs)} remaining`;
    } else if (action === 'noise') {
      el.textContent = `Noise timer: ${formatRemaining(remainingMs)} remaining`;
    }
  } else {
    if (action === 'rain') {
      el.textContent = 'Rain timer: inactive';
    } else if (action === 'noise') {
      el.textContent = 'Noise timer: inactive';
    }
  }
} else {
  const when = new Date(info.time).toLocaleString();
  el.textContent = `Last pressed: ${when} by ${info.user}`;
}
    });

    const rainStatus = document.getElementById('rainStatus');
    if (rainStatus) {
      if (state.rain && state.rain.activeUntil) {
        const remainingMs = new Date(state.rain.activeUntil) - new Date();
        rainStatus.textContent = remainingMs > 0 ? '🟢' : '🔴';
      } else {
        rainStatus.textContent = '🔴';
      }
    }

const noiseStatus = document.getElementById('noiseStatus');
if (noiseStatus) {
  if (state.noise && state.noise.activeUntil) {
    const remainingMs = new Date(state.noise.activeUntil) - new Date();
    noiseStatus.textContent = remainingMs > 0 ? '🟢' : '🔴';
  } else {
    noiseStatus.textContent = '🔴';
  }
}

const doseStatus = document.getElementById('doseStatus');
if (doseStatus) {
  if (state.dose && state.dose.activeUntil) {
    const remainingMs = new Date(state.dose.activeUntil) - new Date();
    doseStatus.textContent = remainingMs > 0 ? '🟢' : '🔴';
  } else {
    doseStatus.textContent = '🔴';
  }
}

const shrimpStatus = document.getElementById('shrimpStatus');
if (shrimpStatus) {
  if (state.shrimp && state.shrimp.activeUntil) {
    const remainingMs = new Date(state.shrimp.activeUntil) - new Date();
    shrimpStatus.textContent = remainingMs > 0 ? '🟢' : '🔴';
  } else {
    shrimpStatus.textContent = '🔴';
  }
}

const stopStatus = document.getElementById('stopStatus');
const resetStopButton = document.getElementById('resetStopButton');

if (stopStatus) {
  if (state.stop && state.stop.active === true) {
    stopStatus.textContent = '🟢';

    if (resetStopButton) {
      resetStopButton.style.display =
        currentUserRole === 'admin' ? 'block' : 'none';
    }
  } else {
    stopStatus.textContent = '🔴';

    if (resetStopButton) {
      resetStopButton.style.display = 'none';
    }
  }
}

  } catch (error) {
    console.error('Failed to load button state', error);
  }
}

function burstFromButton(button, emoji, count = 8) {
  const rect = button.getBoundingClientRect();
  const startX = rect.left + rect.width / 2;
  const startY = rect.top + rect.height / 2;

  for (let i = 0; i < count; i++) {
    const particle = document.createElement('span');
    particle.className = 'emoji-burst';
    particle.textContent = emoji;

    const angle = Math.random() * Math.PI * 2;
    const distance = 35 + Math.random() * 55;
    const dx = `${Math.cos(angle) * distance}px`;
    const dy = `${Math.sin(angle) * distance}px`;
    const rot = `${Math.floor(Math.random() * 180 - 90)}deg`;

    particle.style.left = `${startX}px`;
    particle.style.top = `${startY}px`;
    particle.style.setProperty('--dx', dx);
    particle.style.setProperty('--dy', dy);
    particle.style.setProperty('--rot', rot);

    document.body.appendChild(particle);

    particle.addEventListener('animationend', () => {
      particle.remove();
    });
  }
}

function getBurstEmoji(action) {
  if (action === 'dose') return '🧪';
  if (action === 'shrimp') return '🦐';
  if (action === 'storm') return '⚡';
  if (action === 'stop') return '🛑';
  return '✨';
}

async function sendCommand(action, event) {

const button = event?.currentTarget || document.querySelector(`button[onclick="sendCommand('${action}')"]`);
if (button) {
  burstFromButton(button, getBurstEmoji(action));
}

  const status = document.getElementById('status');

  const statusMap = {
    dose: 'doseStatus',
    shrimp: 'shrimpStatus',
    storm: 'stormStatus',
    stop: 'stopStatus'
  };

  try {
    if (action === 'dose' || action === 'shrimp') {
      const stateResponse = await fetch('/button-state');
      const state = await stateResponse.json();
      const lastInfo = state[action];

      if (lastInfo) {
        const lastDate = new Date(lastInfo.time);
        const now = new Date();

        const sameDay =
          lastDate.getFullYear() === now.getFullYear() &&
          lastDate.getMonth() === now.getMonth() &&
          lastDate.getDate() === now.getDate();

        if (sameDay) {
          const confirmed = confirm(
            `${action} was already pressed today by ${lastInfo.user} at ${lastDate.toLocaleTimeString()}. Press it again?`
          );

          if (!confirmed) {
            return;
          }
        }
      }
    }

    if (action === 'storm') {
      const response = await fetch('/storm');
      const text = await response.text();
      status.textContent = text;

      if (text.toLowerCase().includes('stopped') || text.toLowerCase().includes('off')) {
        document.body.classList.remove('storm-active');
      } else {
        document.body.classList.add('storm-active');
      }

      await loadButtonState();
      return;
    }

if (action === 'stop') {
  const response = await fetch('/stop');
  const text = await response.text();

  document.getElementById('doseStatus').textContent = '🔴';
  document.getElementById('shrimpStatus').textContent = '🔴';
  document.getElementById('stormStatus').textContent = '🔴';
  document.getElementById('stopStatus').textContent = '🔴';

  status.textContent = text;
  await loadButtonState();
 
document.body.classList.remove('storm-active');

 return;
}

if (action === 'reset-stop') {
  const response = await fetch('/reset-stop');
  const text = await response.text();
  status.textContent = text;
  await loadButtonState();
  return;
}

const indicatorId = statusMap[action];
const indicator = document.getElementById(indicatorId);

if (action === 'storm') {
  const response = await fetch('/storm');
  const text = await response.text();
  status.textContent = text;
  await loadButtonState();
  return;
}

if (!indicator) {
  status.textContent = 'Unknown control';
  return;
}


const isCurrentlyOn = indicator.textContent === '🟢';

if (isCurrentlyOn) {
  indicator.textContent = '🔴';
  status.textContent = `${action} turned off`;
} else {
  const response = await fetch('/' + action);
  const text = await response.text();
  status.textContent = text;
  await loadButtonState();
}

    } catch (error) {
      console.error(error);
      status.textContent = 'Error talking to server';
    }
  }
setInterval(loadButtonState, 1000);
  loadUser();
  loadButtonState();

const stormIndicator = document.getElementById('stormStatus');
if (stormIndicator && stormIndicator.textContent.includes('🟢')) {
  document.body.classList.add('storm-active');
} else {
  document.body.classList.remove('storm-active');
}

</script>
</body>
</html>
